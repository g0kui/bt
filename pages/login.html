<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-lg-10">
                    <div class="auth-card" data-aos="zoom-in">
                        <div class="row g-0">
                            <div class="col-lg-6 auth-left">
                                <div class="auth-left-content">
                                    <a href="../index.html" class="brand-logo mb-4 d-inline-block">
                                        
                                        STACKLY
                                    </a>
                                    <h2 class="display-5 fw-bold mb-3 text-white">Welcome Back!</h2>
                                    <p class="text-white-50 mb-4">Access your Stackly account to manage your biotechnology projects and research.</p>
                                    <div class="feature-list">
                                        <div class="feature-item mb-3">
                                            <i class="fas fa-check-circle me-2"></i>
                                            <span>Advanced Research Dashboard</span>
                                        </div>
                                        <div class="feature-item mb-3">
                                            <i class="fas fa-check-circle me-2"></i>
                                            <span>Real-time Data Analytics</span>
                                        </div>
                                        <div class="feature-item mb-3">
                                            <i class="fas fa-check-circle me-2"></i>
                                            <span>Collaborative Tools</span>
                                        </div>
                                        <div class="feature-item">
                                            <i class="fas fa-check-circle me-2"></i>
                                            <span>Secure Cloud Storage</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-6 auth-right">
                                <div class="auth-form-container">
                                    <h3 class="mb-4">Sign In</h3>
                                    <form id="loginForm">
                                        <div class="mb-4">
                                            <label for="userType" class="form-label">Login As *</label>
                                            <select class="form-select form-control" id="userType" required>
                                                <option value="">Select User Type</option>
                                                <option value="admin">Administrator</option>
                                                <option value="researcher">Researcher</option>
                                            </select>
                                        </div>

                                        <div class="mb-3">
                                            <label for="email" class="form-label">Email Address *</label>
                                            <div class="input-group">
                                                <span class="input-icon"><i class="fas fa-envelope"></i></span>
                                                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                                            </div>
                                        </div>

                                        <div class="mb-3">
                                            <label for="password" class="form-label">Password *</label>
                                            <div class="input-group">
                                                <span class="input-icon"><i class="fas fa-lock"></i></span>
                                                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                                                <span class="password-toggle" onclick="togglePassword()">
                                                    <i class="fas fa-eye" id="toggleIcon"></i>
                                                </span>
                                            </div>
                                        </div>

                                        <div class="d-flex justify-content-between align-items-center mb-4">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                                <label class="form-check-label small" for="rememberMe">
                                                    Remember me
                                                </label>
                                            </div>
                                            <a href="404.html" class="small text-primary">Forgot Password?</a>
                                        </div>

                                        <button type="submit" class="btn btn-primary w-100 mb-3">
                                            <i class="fas fa-sign-in-alt me-2"></i> Sign In
                                        </button>

                                        <div class="text-center">
                                            <p class="mb-0 small ">
                                                Don't have an account? 
                                                <a href="register.html" class="text-primary fw-bold">Create Account</a>
                                            </p>
                                        </div>

                                        <div class="divider my-4">
                                            <span>OR</span>
                                        </div>

                                        <div class="social-login">
                                            <button type="button" class="btn btn-outline-light w-100 mb-2" onclick="window.location.href='404.html'">
                                                <i class="fab fa-google me-2"></i> Continue with Google
                                            </button>
                                            <button type="button" class="btn btn-outline-light w-100" onclick="window.location.href='404.html'">
                                                <i class="fab fa-microsoft me-2"></i> Continue with Microsoft
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <a href="../index.html" class="text-white-50 text-decoration-none">
                            <i class="fas fa-arrow-left me-2"></i> Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="../js/main.js"></script>
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userType = document.getElementById('userType').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!userType || !email || !password) {
                alert('Please fill in all required fields');
                return;
            }

            if (userType === 'admin') {
                window.location.href = 'dashboard-admin.html';
            } else if (userType === 'researcher') {
                window.location.href = 'dashboard-user.html';
            }
        });
    </script>
</body>
</html>
